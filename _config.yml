# Redes sociales
social:
  twitter: "https://twitter.com/GaibSpain"
  linkedin: "https://www.linkedin.com/company/global-ai-community-spain/"
  youtube: "https://www.youtube.com/c/GlobalAISpain"
  github: "https://github.com/GlobalAISpain"
