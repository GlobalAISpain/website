# Configuración del sitio
lang: "es"
timezone: "Europe/Madrid"
encoding: "utf-8"

# Plugins para GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Excluir del build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - .env

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
