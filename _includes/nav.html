<!-- Navbar: transparent → solid on scroll, matching original Eventry template -->
<header id="header" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-20 transition-all duration-300">
    <!-- Logo -->
    <a href="/" class="flex items-center gap-2">
      <img id="logo-white" src="{{ site.logo_white }}" alt="{{ site.title }}" class="h-10 transition-opacity duration-300 brightness-0 invert" onerror="this.style.display='none'">
      <img id="logo-dark" src="{{ site.logo_dark }}" alt="{{ site.title }}" class="h-10 hidden transition-opacity duration-300" onerror="this.style.display='none'">
    </a>

    <!-- Desktop Nav -->
    <div class="hidden lg:flex items-center gap-1">
      <a href="#about" class="nav-link px-3 py-2 text-white font-bold text-lg transition-colors hover:text-brand">Agenda</a>
      <a href="#workshops" class="nav-link px-3 py-2 text-white font-bold text-lg transition-colors hover:text-brand">Workshops</a>
      <a href="#location" class="nav-link px-3 py-2 text-white font-bold text-lg transition-colors hover:text-brand">Ubicación</a>
      <a href="#sponsors" class="nav-link px-3 py-2 text-white font-bold text-lg transition-colors hover:text-brand">Sponsors</a>
      <a href="{{ site.youtube_url }}" target="_blank" rel="noopener" class="nav-link px-3 py-2 text-white font-bold text-lg transition-colors hover:text-brand">Youtube</a>
      <a href="{{ site.event.eventbrite_conf }}" target="_blank" rel="noopener"
         class="ml-3 px-5 py-2 bg-brand text-white text-sm font-bold uppercase tracking-wider rounded border-2 border-brand hover:bg-navy hover:border-navy transition-all duration-300">
        Entradas Conferencia
      </a>
      <a href="{{ site.event.eventbrite_ws }}" target="_blank" rel="noopener"
         class="ml-2 px-5 py-2 bg-brand text-white text-sm font-bold uppercase tracking-wider rounded border-2 border-brand hover:bg-navy hover:border-navy transition-all duration-300">
        Entradas Workshops
      </a>
    </div>

    <!-- Mobile toggle -->
    <button id="mobile-toggle" class="lg:hidden text-white text-2xl focus:outline-none" aria-label="Abrir menú">
      <i class="fas fa-bars"></i>
    </button>
  </nav>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden lg:hidden bg-white shadow-lg">
    <div class="px-4 py-4 space-y-2">
      <a href="#about" class="block px-3 py-2 text-dark-deep font-bold text-lg hover:text-brand">Agenda</a>
      <a href="#workshops" class="block px-3 py-2 text-dark-deep font-bold text-lg hover:text-brand">Workshops</a>
      <a href="#location" class="block px-3 py-2 text-dark-deep font-bold text-lg hover:text-brand">Ubicación</a>
      <a href="#sponsors" class="block px-3 py-2 text-dark-deep font-bold text-lg hover:text-brand">Sponsors</a>
      <a href="{{ site.youtube_url }}" target="_blank" class="block px-3 py-2 text-dark-deep font-bold text-lg hover:text-brand">Youtube</a>
      <div class="pt-2 space-y-2">
        <a href="{{ site.event.eventbrite_conf }}" target="_blank" rel="noopener"
           class="block text-center px-5 py-3 bg-brand text-white text-sm font-bold uppercase tracking-wider rounded border-2 border-brand">
          Entradas Conferencia
        </a>
        <a href="{{ site.event.eventbrite_ws }}" target="_blank" rel="noopener"
           class="block text-center px-5 py-3 bg-brand text-white text-sm font-bold uppercase tracking-wider rounded border-2 border-brand">
          Entradas Workshops
        </a>
      </div>
    </div>
  </div>
</header>
